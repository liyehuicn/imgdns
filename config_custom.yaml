#MosDNS v5.3.3 自定义配置
# ===========================
# MosDNS 全局设置
# ===========================
log:
  level: info                 # 日志等级（info 足够）
  # file: "/var/log/mosdns.log"  # 可选：输出到文件

api:
  http: "0.0.0.0:9091"        # 开启 API 端口，便于查看状态

plugins:

  # ===========================
  # 缓存：强烈建议开启
  # ===========================
  - tag: cache
    type: cache
    args:
      size: 10240             # 缓存条数，10240 性价比最高
      lazy_cache_ttl: 600     # 懒缓存：过期后先返回旧 IP，再后台更新
      dump_file: "/var/mosdns/cache.dump"  # 重启自动加载缓存

  # ===========================
  # 白名单：强制走国内
  # ===========================
  - tag: whitelist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/whitelist.txt"

  # ===========================
  # 黑名单：直接拒绝
  # ===========================
  - tag: blocklist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/blocklist.txt"

  # ===========================
  # 灰名单：强制走国外
  # ===========================
  - tag: greylist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/greylist.txt"

  # ===========================
  # geosite / geoip 数据集
  # ===========================
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_cn.txt"

  - tag: geosite_geolocation-!cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_geolocation-!cn.txt"

  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - "/var/mosdns/geoip_cn.txt"

  # ===========================
  # 国内上游（DoH）
  # ===========================
  - tag: domestic_forward
    type: forward
    args:
      concurrent: 3            # 并发查询，提高成功率
      upstreams:
        - addr: "https://doh.pub/dns-query"
          dial_addr: "1.12.12.12"
          idle_timeout: 300
          bootstrap: "223.5.5.5"

        - addr: "https://223.6.6.6/dns-query"
          dial_addr: "223.6.6.6"
          bootstrap: "114.114.114.114"
          idle_timeout: 300

        - addr: "https://223.5.5.5/dns-query"
          dial_addr: "223.5.5.5"
          bootstrap: "119.29.29.29"
          idle_timeout: 300

  # ===========================
  # 国外上游（DoH + 代理）
  # ===========================
  - tag: remote_forward
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: "https://dns.google/dns-query"
          dial_addr: "8.8.8.8"
          idle_timeout: 60
          bootstrap: "1.1.1.1"
          socks5: "192.168.100.2:1081"   # 走代理
        # 可选：Cloudflare 备用
        # - addr: "https://1.1.1.1/dns-query"
        #   dial_addr: "1.1.1.1"
        #   bootstrap: "8.8.8.8"

  # ===========================
  # 国内查询逻辑（含防污染）
  # ===========================
  - tag: query_local
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: ecs
      - exec: "$domestic_forward"
      # 防污染：如果返回的 IP 不在中国 → 丢弃
      - matches: "!resp_ip $geoip_cn"
        exec: drop_resp

  # ===========================
  # 国外查询逻辑
  # ===========================
  - tag: query_remote
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: "$remote_forward"

  # ===========================
  # 主逻辑（核心）
  # ===========================
  - tag: main
    type: sequence
    args:
      - exec: "$cache"         # 优先查缓存

      # 白名单 → 国内
      - matches: qname $whitelist
        exec: "$query_local"

      # 黑名单 → 拒绝
      - matches: qname $blocklist
        exec: reject 0

      # 灰名单 → 强制国外
      - matches: qname $greylist
        exec: "$query_remote"
      - matches: has_resp
        exec: accept

      # 国内域名 → 国内
      - matches: qname $geosite_cn
        exec: "$query_local"

      # 禁用 IPv6 AAAA
      - matches: qtype 28
        exec: reject

      # 国外域名 → 国外
      - matches: qname $geosite_geolocation-!cn
        exec: "$query_remote"
      - matches: has_resp
        exec: accept

      # ============================================
      # 未知域名 → 先国外，再国内（防DNS泄露）
      # ============================================

      # 第一步：先国外
      - exec: "$query_remote"
      - matches: has_resp
        exec: accept

      # 第二步：国外失败 → 再国内
      - exec: "$query_local"
      - matches: has_resp
        exec: accept

      # 最终兜底（可选）
      # - exec: reject 3
  # ===========================
  # DNS 服务器监听端口
  # ===========================
  - tag: udp_server
    type: udp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"   # 建议非 53 端口，避免系统 DNS 泄漏

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
