# ===========================
# MosDNS 全局设置（完整修复版）
# ===========================
log:
  level: info                  # 调试时可改为 debug
  # file: "/var/log/mosdns.log"  # 可选：输出到文件

api:
  http: "0.0.0.0:9091"         # API 监听，用于 mosdns api 或 prometheus 监控

plugins:
  # ===========================
  # 缓存（放在最前面）
  # ===========================
  - tag: cache
    type: cache
    args:
      size: 10240
      lazy_cache_ttl: 600
      dump_file: "/var/mosdns/cache.dump"
      # minimal_ttl: 300       # 可选：最小 TTL，防污染
      # maximum_ttl: 86400     # 可选：最大 TTL

  # ===========================
  # 白名单 / 黑名单 / 灰名单
  # ===========================
  - tag: whitelist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/whitelist.txt"

  - tag: blocklist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/blocklist.txt"

  - tag: greylist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/greylist.txt"

  # ===========================
  # geosite / geoip 数据集
  # ===========================
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_cn.txt"

  - tag: geosite_geolocation-!cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_geolocation-!cn.txt"

  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - "/var/mosdns/geoip_cn.txt"

  # ===========================
  # 国内上游（主：3 并发 DoH）
  # ===========================
  - tag: domestic_forward
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: "https://doh.pub/dns-query"
          dial_addr: "1.12.12.12"
          bootstrap: "223.5.5.5"
          idle_timeout: 300
        - addr: "https://223.6.6.6/dns-query"
          dial_addr: "223.6.6.6"
          bootstrap: "114.114.114.114"
          idle_timeout: 300
        - addr: "https://doh.360.cn/dns-query"
          dial_addr: "101.226.4.6"
          bootstrap: "119.29.29.29"
          idle_timeout: 300

  # ===========================
  # 国内备用上游（阿里 DoH）
  # ===========================
  - tag: domestic_secondary
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "https://dns.alidns.com/dns-query"
          bootstrap: "119.29.29.29"
          idle_timeout: 300

  # ===========================
  # 国内 fallback（主 + 备，快速切换）
  # ===========================
  - tag: domestic_fallback
    type: fallback
    args:
      primary: domestic_forward
      secondary: domestic_secondary
      threshold: 200           # ms，超过此值用备用
      always_standby: true

  # ===========================
  # 国外上游（主：你的自定义 workers.dev）
  # ===========================
  - tag: remote_primary
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "https://v.recipes/dns/public.dns.iij.jp/dns-query"
          #socks5: "192.168.100.2:1081"  # 如需代理可取消注释
          bootstrap: "119.29.29.29"
          idle_timeout: 60

  # ===========================
  # 国外备用上游（Google DoH）
  # ===========================
  - tag: remote_secondary
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "https://v.recipes/dns-query"
          #dial_addr: "8.8.8.8"
          bootstrap: "119.29.29.29"
          #socks5: "192.168.100.2:1081"
          idle_timeout: 60

  # ===========================
  # 国外 fallback（主 + 备）
  # ===========================
  - tag: remote_fallback
    type: fallback
    args:
      primary: remote_primary
      secondary: remote_secondary
      threshold: 800           # ms，国外延迟更高所以阈值大
      always_standby: true

  # ===========================
  # 国内查询逻辑序列
  # ===========================
  - tag: query_local
    type: sequence
    args:
      - exec: prefer_ipv4      # 优先返回 IPv4（可根据需求改 prefer_ipv6）
      - exec: ecs              # 支持 EDNS Client Subnet
      - exec: "$domestic_fallback"

  # ===========================
  # 国外查询逻辑序列
  # ===========================
  - tag: query_remote
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: "$remote_fallback"

  # ===========================
  # 主查询逻辑（防泄漏 + 防污染 + 分流）
  # ===========================
  - tag: main
    type: sequence
    args:
      # 1. 白名单域名 → 强制走国内
      - matches: qname $whitelist
        exec: "$query_local"
      - matches: has_resp
        exec: accept

      # 2. 先查缓存（全局缓存）
      - exec: "$cache"
      - matches: has_resp
        exec: accept

      # 3. 黑名单域名 → 直接拒绝（NXDOMAIN）
      - matches: qname $blocklist
        exec: reject 0

      # 4. 灰名单域名 → 强制走国外
      - matches: qname $greylist
        exec: "$query_remote"
      - matches: has_resp
        exec: accept

      # 5. geosite:cn → 国内
      - matches: qname $geosite_cn
        exec: "$query_local"
      - matches: has_resp
        exec: accept

      # 6. geosite:geolocation-!cn → 国外
      - matches: qname $geosite_geolocation-!cn
        exec: "$query_remote"
      - matches: has_resp
        exec: accept

      # 7. 未知域名智能分流：先查国内 → 如果返回 CN IP 则接受，否则丢弃再查国外
      - exec: "$query_local"
      - matches: resp_ip $geoip_cn
        exec: accept
      - matches: has_resp
        exec: drop_resp          # 非 CN IP，丢弃污染结果
      - exec: "$query_remote"
      - matches: has_resp
        exec: accept

  # ===========================
  # DNS 监听端口（必须放在 plugins 最后！）
  # ===========================
  - tag: udp_server
    type: udp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
