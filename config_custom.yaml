log:
  level: info
  # file: "/var/log/mosdns.log"
api:
  http: "0.0.0.0:9091"
plugins:
  # 规则集
  - tag: cache
    type: cache
    args:
      size: 10240 # 缓存条数。建议设为 10240，占用内存极小但命中率高
      lazy_cache_ttl: 600 # 开启懒缓存10分钟。过期后先返回旧 IP 保证秒开，同时后台更新
      dump_file: "/var/mosdns/cache.dump" # 重启后自动加载之前的缓存，无需重新预热
  
  - tag: whitelist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/whitelist.txt"   # 白名单
      
  - tag: blocklist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/blocklist.txt"
 
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_cn.txt"
  - tag: geosite_geolocation-!cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_geolocation-!cn.txt"
  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - "/var/mosdns/geoip_cn.txt"
  # 上游（建议都用DoH/DoT加密，防中间人/运营商嗅探）
  - tag: domestic_forward
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: "https://doh.pub/dns-query"
          dial_addr: "1.12.12.12"
          idle_timeout: 300
          bootstrap: "223.5.5.5"    #解析域名DNS服务器
        - addr: "https://223.6.6.6/dns-query"
          dial_addr: "223.6.6.6"          
          bootstrap: "114.114.114.114"
          idle_timeout: 300
        - addr: "https://223.5.5.5/dns-query"
          dial_addr: "223.5.5.5"          
          bootstrap: "119.29.29.29"
          idle_timeout: 300
  - tag: remote_forward
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: "https://dns.adguard-dns.com/dns-query"
          idle_timeout: 60
          bootstrap: "8.8.8.8"
          socks5: "127.0.0.1:1081"
        
  # 只用于国内域名的查询序列（可加防污染也可不加）
  - tag: query_local
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: "$domestic_forward"

  # 国外/未知域名的查询序列（直接远程.防泄露）
  - tag: query_remote
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: "$remote_forward"
  # 主逻辑（最关键修改在这里）
  - tag: main
    type: sequence
    args:
      # 缓存（提前放，保持不变）
      - exec: "$cache"
      
      # 新加：白名单优先走国内
      - matches: qname $whitelist
        exec: "$query_local"
      - matches: has_resp
        exec: accept
        
      # 先检查黑名单，屏蔽
      - matches: qname $blocklist
        exec: reject 0   # 0 表示 NXDOMAIN，3 表示 REFUSED，根据需要
      - matches: has_resp
        exec: accept
        
      # 1. 明确国内域名 → 国内上游
      - matches: qname $geosite_cn
        exec: "$query_local"
      - matches: has_resp
        exec: accept
      # 禁用 IPv6（保持不变）
      - matches: qtype 28
        exec: reject
       
      # 2. 明确国外域名 → 国外上游
      - matches: qname $geosite_geolocation-!cn
        exec: "$query_remote"
      - matches: has_resp
        exec: accept
      # 3. 未知域名 → **先国外**（防污染优先）
      - exec: "$query_remote"
      - matches: has_resp
        exec: accept
      # 4. 国外失败 → 再国内（保底，但很少触发）
      - exec: "$query_local"
  # 服务器监听（建议用非53端口防意外泄漏到系统DNS）
  - tag: udp_server
    type: udp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
