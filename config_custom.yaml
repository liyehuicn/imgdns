#MosDNS v5.3.3 openwrt自定义配置
log:
  level: info
  # file: "/var/log/mosdns.log"
api:
  http: "0.0.0.0:9091"
plugins:
  # 规则集
  - tag: cache
    type: cache
    args:
      size: 10240 # 缓存条数。建议设为 10240，占用内存极小但命中率高
      lazy_cache_ttl: 600 # 开启懒缓存10分钟。过期后先返回旧 IP 保证秒开，同时后台更新
      dump_file: "/var/mosdns/cache.dump" # 重启后自动加载之前的缓存，无需重新预热
  
  - tag: whitelist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/whitelist.txt"   # 白名单
      
  - tag: blocklist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/blocklist.txt"  #黑名单
     
  - tag: greylist                          # 新增灰名单 domain_set
    type: domain_set
    args:
      files: 
        - "/etc/mosdns/rule/greylist.txt"  # 灰名单文件   
 
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_cn.txt"
  - tag: geosite_geolocation-!cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_geolocation-!cn.txt"
  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - "/var/mosdns/geoip_cn.txt"
  # 上游（建议都用DoH/DoT加密，防中间人/运营商嗅探）
  - tag: domestic_forward
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: "https://doh.pub/dns-query"
          dial_addr: "1.12.12.12"
          idle_timeout: 300
          bootstrap: "223.5.5.5"    #解析DNS域名服务器
        - addr: "https://223.6.6.6/dns-query"
          dial_addr: "223.6.6.6"          
          bootstrap: "114.114.114.114"
          idle_timeout: 300
        - addr: "https://223.5.5.5/dns-query"
          dial_addr: "223.5.5.5"          
          bootstrap: "119.29.29.29"
          idle_timeout: 300
  - tag: remote_forward
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: "https://dns.google/dns-query"
          idle_timeout: 60
          bootstrap: "1.1.1.1"
          socks5: "127.0.0.1:1081"
        #- addr: "https://1.1.1.1/dns-query"   # 加 Cloudflare 备选（国外稳）
          #dial_addr: "1.1.1.1"
          #bootstrap: "8.8.8.8"   
        
  # 只用于国内域名的查询序列（可加防污染也可不加）
  - tag: query_local
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: "$domestic_forward"
      # 可选：防污染（如果响应 IP 不是国内 → 丢弃）
      - matches: "!resp_ip $geoip_cn"
        exec: drop_resp
  # 国外/未知域名的查询序列（直接远程）
  - tag: query_remote
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: "$remote_forward"
  # 主逻辑（最关键修改在这里）
  - tag: main
    type: sequence
    args:
      - exec: "$cache"  # 先查缓存

    # 白名单 → 国内
      - matches: qname $whitelist
        exec: "$query_local"

    # 黑名单 → 拒绝
      - matches: qname $blocklist
        exec: reject 0

    # 灰名单 → 强制 
      - matches: qname $greylist
        exec: "$remote_forward"  

    # 国内域名 → query_local
      - matches: qname $geosite_cn
        exec: "$query_local"

    # 禁用 IPv6
      - matches: qtype 28
        exec: reject

    # 国外域名 → query_remote
      - matches: qname $geosite_geolocation-!cn
        exec: "$query_remote"

    # 默认未知 → 先国外（防污染）
      - exec: "$query_remote"

    # 全局：只要有响应就接受（覆盖上面所有上游的 resp）
      - matches: has_resp
        exec: accept

    # 兜底：国外失败再试国内
      - exec: "$query_local"
    # 可选：最终没响应 reject
    # - exec: reject 3
  # 服务器监听（建议用非53端口防意外泄漏到系统DNS）
  - tag: udp_server
    type: udp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
