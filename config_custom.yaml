#MosDNS v5.3.3 自定义配置
# ===========================
# MosDNS 全局设置
# ===========================
log:
  level: info # 日志等级（info 足够）
  # file: "/var/log/mosdns.log" # 可选：输出到文件
api:
  http: "0.0.0.0:9091" # 开启 API 端口，便于查看状态
plugins:
  # ===========================
  # 缓存：强烈建议开启
  # ===========================
  - tag: cache
    type: cache
    args:
      size: 10240 # 缓存条数，10240 性价比最高
      lazy_cache_ttl: 600 # 懒缓存：过期后先返回旧 IP，再后台更新
      dump_file: "/var/mosdns/cache.dump" # 重启自动加载缓存

  # ===========================
  # 白名单：强制走国内
  # ===========================
  - tag: whitelist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/whitelist.txt"

  # ===========================
  # 黑名单：直接拒绝
  # ===========================
  - tag: blocklist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/blocklist.txt"

  # ===========================
  # 灰名单：强制走国外
  # ===========================
  - tag: greylist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/greylist.txt"

  # ===========================
  # geosite / geoip 数据集
  # ===========================
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_cn.txt"
  - tag: geosite_geolocation-!cn
    type: domain_set
    args:
      files:
        - "/var/mosdns/geosite_geolocation-!cn.txt"
  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - "/var/mosdns/geoip_cn.txt"

  # ===========================
  # 国内上游（主组：3 个 DoH）
  # ===========================
  - tag: domestic_forward
    type: forward
    args:
      concurrent: 3 # 并发查询，提高成功率
      upstreams:
        - addr: "https://doh.pub/dns-query"
          dial_addr: "1.12.12.12"
          idle_timeout: 300
          bootstrap: "223.5.5.5"
        - addr: "https://223.6.6.6/dns-query"
          dial_addr: "223.6.6.6"
          bootstrap: "114.114.114.114"
          idle_timeout: 300
        - addr: "https://223.5.5.5/dns-query"
          dial_addr: "223.5.5.5"
          bootstrap: "119.29.29.29"
          idle_timeout: 300

  # ===========================
  # 国内备用上游（阿里公共 DoH）
  # ===========================
  - tag: domestic_secondary
    type: forward
    args:
      concurrent: 1 # 单个上游，无需并发
      upstreams:
        - addr: "https://dns.alidns.com/dns-query"
          idle_timeout: 300
          # bootstrap: "223.5.5.5"  # 可选，如果阿里 DoH 需要 bootstrap

  # ===========================
  # 国内 fallback（主 + 阿里备）
  # ===========================
  - tag: domestic_fallback
    type: fallback
    args:
      primary: domestic_forward       # 主组 tag
      secondary: domestic_secondary   # 备组 tag（必须是插件 tag，不能是 URL）
      threshold: 300                  # 主超时 300ms 后切换
      always_standby: true            # 备上游预热连接，切换更快

  # ===========================
  # 国外上游（DoH + 代理）
  # ===========================
  - tag: remote_forward
    type: forward
    args:
      concurrent: 1 # 单个上游，无需并发
      upstreams:
        - addr: "https://dns.adguard-dns.com/dns-query"          # 示例：Cloudflare DoH（或你实际想用的国外 DoH）
          dial_addr: "1.1.1.1"                       # 固定 IP 防污染
          #socks5: "192.168.100.2:1080"               # ← 加这里：你的 SOCKS5 代理端口（改成实际的）
          idle_timeout: 60
          bootstrap: "223.5.5.5"                  # 如果 addr 是域名，可加国内 bootstrap 解析上游

  # ===========================
  # 国内查询逻辑（用 fallback）
  # ===========================
  - tag: query_local
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: ecs
      - exec: "$domestic_fallback"   # 用 fallback 替换 forward

  # ===========================
  # 国外查询逻辑
  # ===========================
  - tag: query_remote
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: "$remote_forward"

  # ===========================
  # 主逻辑（核心）- 修正语法错误
  # ===========================
  - tag: main
    type: sequence
    args:
      # 第一步：优先匹配白名单（缓存前判断，避免缓存干扰）
      - matches: qname $whitelist
        exec: "$cache" # 单条exec用字符串，多条拆分成多个exec
      - matches: qname $whitelist
        exec: "$query_local"
      - matches: qname $whitelist
        exec: accept # 匹配后直接终止后续逻辑
      # 第二步：查缓存（非白名单请求）
      - exec: "$cache"
      # 第三步：黑名单 → 拒绝
      - matches: qname $blocklist
        exec: reject 0
      # 第四步：灰名单 → 强制国外
      - matches: qname $greylist
        exec: "$query_remote"
      - matches: qname $greylist
        exec: accept
      - matches: has_resp
        exec: accept
      # 第五步：国内域名 → 国内
      - matches: qname $geosite_cn
        exec: "$query_local"
      # 第六步：禁用 IPv6 AAAA
      - matches: qtype 28
        exec: reject
      # 第七步：国外域名 → 国外
      - matches: qname $geosite_geolocation-!cn
        exec: "$query_remote"
      - matches: has_resp
        exec: accept
      # ==============================
      # 未知域名 → 先国外，再国内（防DNS泄露）
      # ==============================
      # 第一步：先国外
      - exec: "$query_remote"
      - matches: has_resp
        exec: accept
      # 第二步：国外失败 → 再国内
      - exec: "$query_local"
      - matches: has_resp
        exec: accept

  # ===========================
  # DNS 服务器监听端口
  # ===========================
  - tag: udp_server
    type: udp_server
    args:
      entry: main
      listen: "0.0.0.0:5335" # 建议非 53 端口，避免系统 DNS 泄漏
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main
      listen: "0.0.0.0:5335"
